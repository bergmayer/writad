# XcodeGen spec — fallback if Ayyyy.xcodeproj fails to open.
#
# Install XcodeGen via Homebrew (brew install xcodegen), then:
#   rm -rf Ayyyy.xcodeproj
#   xcodegen generate
#
name: Ayyyy
options:
  bundleIdPrefix: com.palefire
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  EditorKit:
    path: Packages/EditorKit
  TreeSitterTypst:
    path: Packages/TreeSitterTypst

targets:
  Ayyyy:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources/Assets.xcassets
    info:
      path: App/Resources/Info.plist
    entitlements:
      path: App/Resources/Ayyyy.entitlements
    dependencies:
      - package: EditorKit
        product: FileEncoding
      - package: EditorKit
        product: LineEnding
      - package: EditorKit
        product: LineSort
      - package: EditorKit
        product: CharacterInfo
      - package: EditorKit
        product: EditorEngine
      - package: EditorKit
        product: AyyyySyntax
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.palefire.ayyyy
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "6.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: App/Resources/Ayyyy.entitlements
